name: "ok-roko"
uac: true
profiles:
  - name: "Release"
    git_url: "https://github.com/aimer-rhythm/ok-roko"
    admin: true
    main_script: "main.py"
    requires_python: "3.12"
    requirements: "requirements.txt"
    use_pythonw: true
    show_add_defender: true

  - name: "Debug"
    main_script: "main_debug.py"
    requirements: "requirements.txt"

  - name: Build with PyAppify Action
    id: build-app
    uses: ok-oldking/pyappify-action@master
    with:
      # 使用上一个稳定版本的 Release 来获取已打包的启动器，从而跳过耗时的打包过程
      use_release: https://api.github.com/repos/aimer-rhythm/ok-roko/releases/tags/v0.1.8